<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- TITLE: replace with your headline (or a working slug). -->
  <title></title>

  <style>
    /* Minimal defaults. Override, replace, or delete entirely.
       Make typographic and color choices that suit your story —
       don't let this stylesheet decide them for you. */
    body   { margin: 0; font-family: Georgia, serif; line-height: 1.5; color: #111; background: #fff; }
    main   { max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
    figure { margin: 2rem 0; }
    svg    { width: 100%; height: auto; display: block; }
  </style>
</head>
<body>
<main>


  <!-- HEADLINE
       A specific, declarative statement of what this graphic shows.
       Not a topic ("Climate change") but a claim or finding the
       evidence supports. -->


  <!-- DEK / STANDFIRST
       One or two sentences. Frame the stakes. Why does this matter,
       and to whom? -->


  <!-- BYLINE
       Your name. Affiliation if relevant. Publication date. -->


  <figure>

    <!-- The graphic renders here.
         Approach 1 (Plot) and Approach 2 (D3) mount into this div.
         Approach 3 (hand-coded SVG): replace this div with an <svg>
         element written directly in the HTML. -->
    <div id="viz"></div>


    <!-- CAPTION
         A reading aid. Name the comparison being made. Tell the
         reader what to look for, not just what they're looking at. -->


    <!-- SOURCE LINE
         "Source: ..." Specific. Versioned if your data has versions.
         Include retrieval date for live or scraped data. -->

  </figure>


  <!-- METHODOLOGY NOTE
       How was this data produced? What was excluded? What context
       must travel with this graphic so it isn't misread?
       This is where Trace's concerns live in the published artifact. -->


</main>


<!-- =================================================================
     DATA
     Replace the contents of this script block with your own data.
     Inline JSON keeps the file self-contained. If your dataset is
     large, consider summarizing or aggregating before embedding —
     the goal is a single archivable HTML file.
     ================================================================= -->
<script id="data" type="application/json">
[
  {"category": "A", "value": 12},
  {"category": "B", "value": 19},
  {"category": "C", "value":  7},
  {"category": "D", "value": 23}
]
</script>

     ================================================================= -->

     Best for custom encodings, unusual shapes, or anything that
     doesn't fit a standard chart type.
     Documentation: https://d3js.org/
     Uncomment the block below to use.
     ================================================================= -->

<!-- =================================================================
     APPROACH 3 — Hand-coded SVG
     No library. You write the SVG directly and compute coordinates
     yourself. Slow, but pedagogically powerful: every mark is a
     deliberate choice. Best fit for the autographic spirit — a
     hand-made graphic is itself a kind of evidentiary trace.

     For this approach, replace the <div id="viz"></div> in the
     <figure> above with SVG written inline. The block below is an

       B: 19 → bar height 190
       C:  7 → bar height  70
       D: 23 → bar height 230
